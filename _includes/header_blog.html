<header>

    <!-- Nav Bar -->
    <nav id="navbar" class="navbar navbar-light bg-white navbar-expand-sm {% if site.navbar_fixed %}fixed-top{% else %}sticky-top{% endif %}">
    <div class="container" style="padding: 0.25em;">
      {% if page.title != "about" %}
      <a class="navbar-brand title font-weight-lighter" href="{{ site.baseurl | prepend: site.url }}/">
       {% if site.title == blank %}{{ site.title }}{% else %} 
          <span class="font-weight-bold"><img src="/assets/logo-atom.png" height="30" width="30" alt="">&nbsp;&nbsp;{{ site.first_name }}</span> {{ site.middle_name }}  {{ site.last_name }}{% endif %}
      </a>
      {% elsif site.show_social_icons %}
        <!-- Social Icons -->
        <div class="row ml-1 ml-sm-0">
          {% include social.html %}
        </div>
      {% endif %}
       <a class="navbar-brand title font-weight-lighter" href="{{ site.baseurl | prepend: site.url }}/blog/">
          {{ site.blog_name }}
      </a>
    </div>
  </nav>

</header>

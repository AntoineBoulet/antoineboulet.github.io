format:
  html:
    lang: fr-FR
    date-format: "DD MMMM YYYY"
    link-external-newwindow: true
    link-external-icon: true
    include-in-header:
      - system/scripts/mathjax-config-notebook.html
      - system/scripts/redirect-navbar-fr.html
      - system/includes/icons.html
       
    toc: true

    css: 
      - system/styles/theme.css
      - system/styles/book.css

    html-math-method:
      method: mathjax
      url: "https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
---
layout: default
---
<div class="post">

  <header class="post-header">
    <h1 class="post-title"> {{ page.title }} 
    {% if page.document %} 
      <span style="float:right;">{{ page.document }}</span>
    {% else %}
    {% endif %}
    </h1>
    <p class="post-description">{{ page.description }}</p>
  </header>

  <article>
    {{ content }}
  </article>

</div>

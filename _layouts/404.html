<style>
.button {
  background-color: #4CAF50; /* Green */

  color: white;

  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  transition-duration: 0.4s;

  border-radius: 50px;

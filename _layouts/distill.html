<!DOCTYPE html>
<html>
  
  
    {% include head.html %}
    <script src="{{ '/assets/js/distillpub/template.v2.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/distillpub/transforms.v2.js' | relative_url }}"></script>
    {% if page._styles %}
    <style type="text/css">
      {{ page._styles }}
    </style>
    {% endif %}

  
    
    <script type="text/x-mathjax-config">
      MathJax.Hub.Config({
        TeX: { equationNumbers: { autoNumber: "AMS" } }
      });
    </script>
    
    <script>
    MathJax = {
     tex: {
     inlineMath: [['$', '$'], ['\\(', '\\)']]
    },
    svg: {
     fontCache: 'global'
    }
    };
    </script>

    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  
  

  <style>
  d-toc {
    display: block;
  }
  d-toc ul {
    padding-left: 0;
    list-style-type: disc;
  }
  d-toc ul > ul {
    padding-left: 24px;
  }
  d-toc a {
    border-bottom: none;
    text-decoration: none;
  }
    
    
#contents nav a {
    color: rgba(0, 0, 0, 0.8);
    border-bottom: none;
    text-decoration: none;
}

#contents nav ul li {
    margin-bottom: .25em;
}

#contents nav a:hover {
    text-decoration: underline solid rgba(0, 0, 0, 0.6);
}

#contents nav details ul {
    margin-top: 0;
}

#contents nav details > a {
    margin-left: 1.06em;
}

#contents nav summary,
#contents nav > div,
#contents nav details > a {
    display: block;
    outline: none;
    margin-bottom: 0.5em;
}

#contents nav > div {
    margin-left: 1.06em;
}

#contents nav summary {
    cursor: context-menu;
}

#contents nav summary,
#contents nav > div > a {
    font-size: 13px;
    font-weight: 600;
}
  </style>

  
</head>

  <d-front-matter>
    <script type="text/json">{
      "title": "{{ page.title }}",
      "description": "{{ page.description }}",
      "published": "{{ page.date }}",
      "authors": [
        {% for author in page.authors %}
        {
          "author": "{{ author.name }}",
          "authorURL": "{{ author.url }}",
          "affiliations": [
            {
              "name": "{{ author.affiliations.name }}",
              "url": "{{ author.affiliations.url }}"
            }
          ]
        }{% if forloop.last == false %},{% endif %}
        {% endfor %}
      ],
      "katex": {
        "delimiters": [
          {
            "left": "$",
            "right": "$",
            "display": false
          },
          {
            "left": "$$",
            "right": "$$",
            "display": true
          }
        ]
      }
    }</script>
  </d-front-matter>

  <body class="{% if site.navbar_fixed %}fixed-top-nav{% endif %} {% unless site.footer_fixed %}sticky-bottom-footer{% endunless %}">

    <!-- Header -->

    {% include header.html %}

    <!-- Content -->

    <div class="post distill">

      <d-title style="font-family: Georgia, Times, serif ;">
        <h1>{{ page.title }}</h1>
        <p>{{ page.description }}</p>
      </d-title>

      <d-byline></d-byline>

 
      
      
      <d-article>
        <d-toc id="toc"></d-toc>
        <div style="text-align:justify; text-justify:auto; font-family: Georgia, Times, serif ;">
        {{ content }}
        </div>
      </d-article>

      <d-appendix style="font-family: Georgia, Times, serif ;">
        <d-footnote-list></d-footnote-list>
        <d-citation-list></d-citation-list>
      </d-appendix>

    </div>

    <!-- Footer -->

    {% include footer.html %}

  </body>

  {% include hemline.html %}

  <d-bibliography src="{{ page.bibliography | prepend: '/assets/bibliography/' | relative_url }}">
  </d-bibliography>

</html>

research-interests:
  en: |
    Ongoing research sits at the intersection of:

    - strongly correlated quantum matter and universal behavior near unitarity
    - Effective Field Theory and its application to many-body systems
    - non-empirical and *ab initio* density functional theory
    - superfluidity, pairing correlations, and spontaneous symmetry breaking
    - real-time quantum dynamics and non-equilibrium collective phenomena
    - nuclear structure, infinite nuclear matter, and connections to neutron star physics

    The unifying thread is the development of a theoretical framework in which the same underlying physical principles — Effective Field Theory, spontaneous symmetry breaking, systematic resummation and renormalization — govern the description of fermionic matter across systems, without the need for system-specific empirical calibration.
  fr: |
    Les recherches en cours se situent à l'intersection de :

    - matière quantique fortement corrélée et comportement universel à l'unitarité
    - théorie effective des champs et ses applications aux systèmes à N corps
    - théorie de la fonctionnelle de la densité non empirique et *ab initio*
    - superfluidité, corrélations d'appariement et brisure spontanée de symétrie
    - dynamique quantique et phénomènes collectifs hors équilibre
    - structure nucléaire, matière nucléaire infinie et connexions avec la physique des étoiles à neutrons

    Le fil directeur est le développement d'un cadre théorique dans lequel les mêmes principes physiques fondamentaux — théorie effective des champs, brisure spontanée de symétrie, resommation systématique et renormalisation — gouvernent la description de la matière fermionique pour l'ensemble des systèmes considérés, sans recours à un ajustement empirique propre à chaque système.

research-overview:
  en: |
    A fundamental challenge of quantum many-body physics is to understand how collective quantum phenomena — superfluidity, collective excitations, spontaneous symmetry breaking — emerge from the underlying microscopic interactions between fermions. My research addresses this challenge by developing non-empirical and systematically improvable Density Functional Theory for strongly correlated fermionic systems. The overarching aim is to formulate Density Functional Theory within an Effective Field Theory framework, thereby grounding Density Functional Theory in the low-energy constants of the bare interaction — the scattering length, effective range, and higher-order shape parameters — rather than in phenomenological fits to experimental data. This approach is intended to be applicable across a broad class of fermionic systems: ultracold gases, atomic nuclei, neutron matter, and the neutron-rich nuclear matter found in neutron stars.

    What makes this program coherent across such apparently disparate systems is the existence of deep physical analogies rooted in the universal properties of strongly interacting fermions. Near unitarity — where the scattering length diverges, the interaction energy scale drops out, and thermodynamic properties are governed solely by the Fermi energy — dilute neutron matter and ultracold Fermi gases obey the same equation of state to leading order in finite-range corrections. Atomic nuclei, though finite and self-bound, are subject to the same organizational principles of spontaneous symmetry breaking and emergent collective behavior. These connections are not merely qualitative: they provide concrete quantitative constraints — on coupling constants and universal ratios — that can inform the construction of density functionals across systems.

    In practice, this research combines analytical developments — drawing on Effective Field Theory and many-body techniques within a Quantum Field Theory formalism — with large-scale numerical simulations, with the aim of bridging microscopic many-body theory and density functional theory for both structural and dynamical properties of fermionic systems.
  fr: |
    Un défi fondamental de la physique quantique à N corps est de comprendre comment les phénomènes quantiques collectifs — superfluidité, excitations collectives, brisure spontanée de symétrie — émergent des interactions microscopiques entre fermions. Mes travaux s'attaquent à ce problème en développant une théorie de la fonctionnelle de la densité non empiriques et systématiquement améliorables pour les systèmes fermioniques fortement corrélés. L'objectif central est de formuler la théorie de la fonctionnelle de la densité dans le cadre d'une théorie effective des champs, ancrant ainsi la théorie de la fonctionnelle de la densité dans les constantes de basse énergie de l'interaction nue — longueur de diffusion, portée effective et paramètres de forme d'ordre supérieur — plutôt que dans des ajustements phénoménologiques aux données expérimentales. Cette approche vise à s'appliquer à une large classe de systèmes fermioniques : gaz ultrafroids, noyaux atomiques, matière neutronique et matière nucléaire riche en neutrons telle qu'elle existe dans les étoiles à neutrons.

    La cohérence de ce programme, pour des systèmes aussi différents en apparence, repose sur l'existence d'analogies physiques profondes, enracinées dans les propriétés universelles des fermions fortement corrélés. À l'unitarité — où la longueur de diffusion diverge, l'échelle d'énergie propre à l'interaction disparaît, et les propriétés thermodynamiques sont gouvernées par la seule énergie de Fermi — la matière neutronique diluée et les gaz de Fermi ultrafroids obéissent à la même équation d'état à l'ordre dominant en corrections de portée finie. Les noyaux atomiques, bien que systèmes finis et auto-liés, sont soumis aux mêmes principes organisateurs de brisure spontanée de symétrie et de comportement collectif émergent. Ces analogies vont au-delà du qualitatif : elles fournissent des contraintes quantitatives concrètes — sur les constantes de couplage et les rapports universels — qui peuvent guider la construction de fonctionnelles de la densité d'un système à l'autre.

    En pratique, ces recherches combinent des développements analytiques — faisant appel à la théorie effective des champs et aux techniques du problème à N corps dans le cadre du formalisme de la théorie quantique des champs — avec des simulations numériques à grande échelle, dans le but d'établir des ponts entre les théories microscopiques à N corps et la théorie de la fonctionnelle de la densité pour les propriétés structurales et dynamiques des systèmes fermioniques.

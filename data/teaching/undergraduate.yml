      approximate: true
  course-description:
    en: |
      Active-learning courses covering fundamental concepts in physics, chemistry, mathematics, and computer programming, with an emphasis on quantitative modeling, experimentation, computational methods, and engineering applications.
    fr: |
      Enseignements fondés sur des pédagogies actives couvrant les concepts fondamentaux de la physique, de la chimie, des mathématiques et de la programmation informatique, avec un accent particulier sur la modélisation quantitative, l'expérimentation, les méthodes numériques et les applications en ingénierie.

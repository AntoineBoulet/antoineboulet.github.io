- id: UE-1.2-2.2-3.2-4.2
  promotion: CP ISMANS A1 & A2
  course-title:
    en: General physics
    fr: Physique générale
  years:
    - 2024
    - 2025
  teaching:
    lecture:
      hours: 77
    tutorials:
      hours: 77
  course-description:
    en: |
      Core topics include classical mechanics, wave phenomena, optics, electromagnetism, thermodynamics, statistical physics, transport phenomena, fluid dynamics, and selected concepts from modern physics.
    fr: |
      Les principaux thèmes abordés incluent la mécanique classique, les phénomènes ondulatoires, l'optique, l'électromagnétisme, la thermodynamique, la physique statistique, les phénomènes de transport, la mécanique des fluides ainsi que certains concepts de la physique moderne.
  materials: https://antoineboulet.github.io/

- id: UE-2.4

    tutorials:
      hours: 21
    project: true
  course-description:
    en: |
      An integrated learning experience in electromagnetism, including lectures, tutorials, and an applied engineering project. The course focuses on fundamental theory, mathematical modeling, and engineering applications.
    fr: |
      Une expérience d'apprentissage intégrée en électromagnétisme comprenant des cours magistraux, des travaux dirigés et un projet d'ingénierie appliqué. L'enseignement met l'accent sur les fondements théoriques, la modélisation mathématique et les applications en ingénierie.

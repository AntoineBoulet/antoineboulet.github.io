research:
  en: |
    My research develops non-empirical density functional theories for strongly correlated fermionic systems — from ultracold atomic gases to atomic nuclei and neutron stars — grounded in effective field theory rather than phenomenological fitting, with the aim of understanding how collective quantum phenomena such as superfluidity emerge from microscopic interactions from first principles.
  fr: |
    Mes recherches portent sur le développement de théories de la fonctionnelle de la densité non empiriques pour les systèmes fermioniques fortement corrélés — des gaz atomiques ultrafroids aux noyaux atomiques et aux étoiles à neutrons — ancrées dans la théorie des champs effective plutôt que dans des ajustements phénoménologiques, avec pour objectif de comprendre comment des phénomènes collectifs tels que la superfluidité émergent des interactions microscopiques à partir de premier principe.

teaching:
  en: |
    I teach physics, mathematics, chemistry, and programming at an engineering school, with the aim of building rigorous scientific foundations and developing students' capacity for abstraction and analytical reasoning — in the belief that a solid grasp of fundamental concepts is what ultimately enables principled innovation.
  fr: |
    J'enseigne la physique, les mathématiques, la chimie et la programmation en école d'ingénieurs, avec pour objectif de transmettre des bases scientifiques rigoureuses et de développer la capacité d'abstraction et le raisonnement analytique — convaincu que la maîtrise des concepts fondamentaux est ce qui permet, à terme, d'innover avec méthode.